<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AIDA - Cargar Notas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/seguridad.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="/styles.css"> 
    
</head>
<body>
    <nav class="navbar">
        <h1 class="navbar-brand"><i class="ph ph-graduation-cap"></i> Sistema AIDA</h1>
        <div class="navbar-links">
            <a href="/menu"><i class="ph ph-squares-four"></i> Inicio</a>
            <a href="/app/alumnos"><i class="ph ph-users"></i> Alumnos</a>
            <a href="/app/certificados"><i class="ph ph-certificate"></i> Emisión Individual</a>
            <a href="/app/fecha"><i class="ph ph-files"></i> Emisión por Fecha</a>
            <a href="/app/archivo"><i class="ph ph-upload-simple"></i> Carga Múltiple (CSV)</a>
            <button onclick="cerrarSesion()" class="btn-logout"><i class="ph ph-sign-out"></i> Salir</button>
        </div>
    </nav>

    <div class="contenedor">
        <div class="tarjeta-form">
            <h1><i class="ph ph-pencil-line"></i> Registrar Nota Aprobada</h1>
            <p>Ingrese los datos de la cursada para asentar la aprobación en el historial académico del alumno. El sistema verificará de forma automática el plan de estudios.</p>
            
            <form id="formCursada">
                <div class="grupo-form">
                    <label for="lu">Libreta Universitaria (LU):</label>
                    <input type="text" id="lu" name="lu" placeholder="Ej: 123/24" required>
                </div>
                
                <div class="grupo-form">
                    <label for="idMateria">ID de la Materia:</label>
                    <input type="number" id="idMateria" name="idMateria" placeholder="Ej: 1" required>
                </div>
                
                <div class="fila-doble">
                    <div class="grupo-form">
                        <label for="anio">Año de Cursada:</label>
                        <input type="number" id="anio" name="anio" placeholder="Ej: 2024" required>
                    </div>
                    
                    <div class="grupo-form">
                        <label for="cuatrimestre">Cuatrimestre:</label>
                        <input type="number" id="cuatrimestre" name="cuatrimestre" placeholder="1 o 2" min="1" max="2" required>
                    </div>

                    <div class="grupo-form" style="margin-top: 15px;">
                        <label for="nota">Nota de cierre (1 al 10):</label>
                        <input type="number" id="nota" name="nota" placeholder="Ej: 7" min="1" max="10" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-generar">
                    <i class="ph ph-floppy-disk"></i> Guardar Cursada
                </button>
            </form>

            <div id="resultado" class="mensaje"></div>
        </div>
    </div>

    <script>
        document.getElementById('formCursada').addEventListener('submit', async (evento) => {
            evento.preventDefault(); 
            
            const lu = document.getElementById('lu').value;
            const idMateria = document.getElementById('idMateria').value;
            const anio = document.getElementById('anio').value;
            const cuatrimestre = document.getElementById('cuatrimestre').value;
            const nota = document.getElementById('nota').value;

            mostrarMensaje('Procesando carga, por favor espere...', '');

            const paqueteDatos = {
                lu: lu,
                idMateria: idMateria,
                año: anio, 
                cuatrimestre: cuatrimestre,
                nota: parseInt(nota) 
            };
            try {
                const respuesta = await fetch('/api/v0/cursada', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paqueteDatos)
                });

                const json = await respuesta.json();

                if (respuesta.ok) {
                    mostrarMensaje(json.mensaje, 'exito');
                    document.getElementById('formCursada').reset(); 
                } else {
                    mostrarMensaje(json.mensaje || 'Error al guardar la cursada.', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión con el servidor.', 'error');
            }
        });

        function mostrarMensaje(texto, tipo) {
            const divResultado = document.getElementById('resultado');
            
            if (tipo === '') {
                // Estilos para el estado "Cargando..."
                divResultado.className = 'mensaje';
                divResultado.style.backgroundColor = '#f1f5f9';
                divResultado.style.borderColor = '#e2e8f0';
                divResultado.style.color = '#475569';
            } else {
                // Limpiamos los colores en línea para que actúen las clases CSS (exito/error)
                divResultado.style.backgroundColor = '';
                divResultado.style.borderColor = '';
                divResultado.style.color = '';
                divResultado.className = `mensaje ${tipo}`;
            }
            
            // Aseguramos que SIEMPRE sea visible al final
            divResultado.style.display = 'block'; 
            divResultado.textContent = texto;
        }

        async function cerrarSesion() {
            try {
                await fetch('/api/v0/auth/logout', { method: 'POST' });
                window.location.href = '/app/login';
            } catch (error) { 
                alert("Error al intentar cerrar sesión."); 
            }
        }
    </script>
</body>
</html>
