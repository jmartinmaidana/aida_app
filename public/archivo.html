<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema AIDA - Carga Múltiple (CSV)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/seguridad.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/styles.css"> 
</head>
<body>
    <nav class="navbar">
        <h1 class="navbar-brand" onclick="window.location.href='/menu'" style="cursor: pointer;" title="Volver al Inicio">
            <i class="ph ph-graduation-cap"></i> Sistema AIDA
        </h1>
        <div class="navbar-links">
            <a href="/menu"><i class="ph ph-squares-four"></i> Inicio</a>
            <a href="/app/alumnos"><i class="ph ph-users"></i> Alumnos</a>
            <a href="/app/cursada"><i class="ph ph-pencil-line"></i> Carga de Notas</a>
            <a href="/app/certificados"><i class="ph ph-certificate"></i> Emisión Individual</a>
            <a href="/app/fecha"><i class="ph ph-files"></i> Emisión por Fecha</a>
            <button onclick="cerrarSesion()" class="btn-logout"><i class="ph ph-sign-out"></i> Salir</button>
        </div>
    </nav>

    <div class="contenedor">
        <div class="tarjeta-form">
            <h1><i class="ph ph-file-csv"></i> Carga Múltiple de Alumnos (CSV)</h1>
            <p>Seleccione un archivo en formato delimitado por comas (.csv) para importar un lote de inscriptos y registrarlos directamente en la base de datos.</p>
            
            <div class="area-carga" id="zonaCarga">
                <i class="ph ph-file-csv" style="font-size: 48px; color: #94a3b8; margin-bottom: 15px;"></i>
                <p style="margin: 0 0 15px 0; color: #475569; font-size: 0.95rem;">Arrastre y suelte su archivo aquí o</p>
                
                <input type="file" id="inputCsv" accept=".csv" style="display: none;">
                
                <label for="inputCsv" class="btn-seleccionar">
                    <i class="ph ph-folder-open"></i> Seleccionar Archivo
                </label>
                
                <p id="nombreArchivo" style="margin: 15px 0 0 0; font-weight: 600; color: #0284c7; display: none; word-break: break-all; font-size: 0.95rem;"></p>
            </div>
            
            <button onclick="procesarYEnviarArchivo()" class="btn-generar">
                <i class="ph ph-upload-simple"></i> Procesar y Cargar Datos
            </button>

            <div id="resultado" class="mensaje"></div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE DRAG & DROP Y SELECCIÓN DE ARCHIVO ---
        const zonaCarga = document.getElementById('zonaCarga');
        const inputCsv = document.getElementById('inputCsv');
        const nombreArchivo = document.getElementById('nombreArchivo');

        // Cuando el usuario hace clic en el botón y selecciona un archivo tradicionalmente
        inputCsv.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                nombreArchivo.textContent = e.target.files[0].name;
                nombreArchivo.style.display = 'block';
            }
        });

        // Eventos para arrastrar y soltar
        zonaCarga.addEventListener('dragover', (e) => {
            e.preventDefault(); // Necesario para permitir el "drop"
            zonaCarga.classList.add('drag-over'); // Pinta la zona de azul claro
        });

        zonaCarga.addEventListener('dragleave', () => {
            zonaCarga.classList.remove('drag-over'); // Vuelve al color normal
        });

        zonaCarga.addEventListener('drop', (e) => {
            e.preventDefault();
            zonaCarga.classList.remove('drag-over');
            
            if (e.dataTransfer.files.length > 0) {
                const archivoDroppeado = e.dataTransfer.files[0];
                
                if (archivoDroppeado.name.endsWith('.csv')) {
                    inputCsv.files = e.dataTransfer.files; // Enganchamos el archivo al input oculto
                    nombreArchivo.textContent = archivoDroppeado.name;
                    nombreArchivo.style.display = 'block';
                } else {
                    mostrarMensaje('Por favor, arrastre únicamente un archivo con extensión .csv', 'error');
                }
            }
        });

        // --- LÓGICA DE ENVÍO AL SERVIDOR ---
        async function procesarYEnviarArchivo() {
            if (inputCsv.files.length === 0) {
                mostrarMensaje('Por favor, seleccione o arrastre un archivo CSV.', 'error');
                return;
            }

            const archivo = inputCsv.files[0];
            const lector = new FileReader();
            const btnGenerar = document.querySelector('.btn-generar');

            mostrarMensaje('Leyendo y convirtiendo archivo...', '');

            // Efecto de carga
            const contenidoOriginal = btnGenerar.innerHTML;
            btnGenerar.innerHTML = '<i class="ph ph-spinner icono-cargando"></i> Subiendo alumnos...';
            btnGenerar.disabled = true;

            lector.onload = async function(evento) {
                const contenido = evento.target.result;
                const lineas = contenido.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                const encabezados = lineas[0].split(',');
                
                if (encabezados.length < 7) {
                    mostrarMensaje('El archivo CSV no tiene las 7 columnas requeridas.', 'error');
                    // Restauramos si falla la validación del CSV
                    btnGenerar.innerHTML = contenidoOriginal;
                    btnGenerar.disabled = false;
                    return;
                }

                const alumnosJson = [];
                for (let i = 1; i < lineas.length; i++) {
                    const datos = lineas[i].split(',');
                    if (datos.length >= 7) {
                        alumnosJson.push({
                            lu: datos[0].trim(),
                            nombres: datos[1].trim(),
                            apellido: datos[2].trim(),
                            carrera_id: datos[3].trim() ? parseInt(datos[3].trim()) : null, 
                            titulo: datos[4].trim() || null,
                            titulo_en_tramite: datos[5].trim() || null,
                            egreso: datos[6].trim() || null
                        });
                    }
                }

                try {
                    const respuesta = await fetch('/api/v0/archivo', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(alumnosJson)
                    });

                    const datosRespuesta = await respuesta.json();

                    if (datosRespuesta.estado === 'exito') {
                        mostrarMensaje(datosRespuesta.mensaje, 'exito');
                        inputCsv.value = ''; 
                        nombreArchivo.style.display = 'none';
                    } else {
                        mostrarMensaje(datosRespuesta.mensaje + (datosRespuesta.detalle ? ': ' + datosRespuesta.detalle : ''), 'error');
                    }
                } catch (error) {
                    mostrarMensaje('Error de conexión al enviar los datos al servidor.', 'error');
                } finally {
                    // Restauramos el botón al terminar
                    btnGenerar.innerHTML = contenidoOriginal;
                    btnGenerar.disabled = false;
                }
            };

            lector.readAsText(archivo);
        }

        function mostrarMensaje(texto, tipo) {
            const divResultado = document.getElementById('resultado');
            
            if (tipo === '') {
                divResultado.className = 'mensaje';
                divResultado.style.backgroundColor = '#f1f5f9';
                divResultado.style.borderColor = '#e2e8f0';
                divResultado.style.color = '#475569';
            } else {
                divResultado.style.backgroundColor = '';
                divResultado.style.borderColor = '';
                divResultado.style.color = '';
                divResultado.className = `mensaje ${tipo}`;
            }
            
            divResultado.style.display = 'block'; 
            divResultado.textContent = texto;
        }

        async function cerrarSesion() {
            try {
                await fetch('/api/v0/auth/logout', { method: 'POST' });
                window.location.href = '/app/login';
            } catch (error) { 
                alert("Error al intentar cerrar sesión."); 
            }
        }
    </script>
</body>
</html>
