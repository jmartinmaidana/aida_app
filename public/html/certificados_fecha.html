<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema AIDA - Emisión Masiva por fecha</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/seguridad.js"></script>
    <script src="/js/shared.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/certificados_fecha.js" defer></script>
    <link rel="stylesheet" href="/css/styles.css"> 

</head>
<body>
    <navbar-aida></navbar-aida>

    <div class="contenedor">
        <div class="tarjeta-form">
            <h1><i class="ph ph-files"></i> Emisión Masiva por Fecha</h1>
            <p>Ingrese la fecha de solicitud del título para procesar en lote y generar los certificados de todos los alumnos correspondientes a esa fecha.</p>
            
            <div class="grupo-form">
                <label for="inputFecha">Fecha de Título en Trámite:</label>
                <input type="date" id="inputFecha" required>
            </div>
            
            <button onclick="buscarPorFecha()" class="btn-generar">
                <i class="ph ph-paper-plane-right"></i> Generar Lote de Certificados
            </button>

            <div id="resultado" class="mensaje"></div>
        </div>
    </div>

    <footer-aida></footer-aida>

</body>
</html>
