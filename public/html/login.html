<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AIDA - Iniciar Sesión</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="/js/login.js" defer></script>
    <link rel="stylesheet" href="/css/styles.css"> 
</head>
<body>

    <div class="login-wrapper">
        <div class="tarjeta-login">
            <div class="cabecera-login">
                <h1><i class="ph ph-graduation-cap"></i> AIDA</h1>
                <p>Acceso al sistema de gestión de alumnos</p>
            </div>
            
            <form id="loginForm">
                <div class="grupo-form">
                    <label for="username">Usuario</label>
                    <div class="input-con-icono">
                        <i class="ph ph-user"></i>
                        <input type="text" id="username" name="username" placeholder="Ingrese su nombre de usuario" autocomplete="username" required>
                    </div>
                </div>
                
                <div class="grupo-form">
                    <label for="password">Contraseña</label>
                    <div class="input-con-icono">
                        <i class="ph ph-lock-key"></i>
                            <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" autocomplete="current-password" required>                    </div>
                </div>
                
                <button type="submit" class="btn-ingresar">
                    Iniciar Sesión <i class="ph ph-sign-in"></i>
                </button>
            </form>

            <div id="mensajeError" class="mensaje error"></div>
        </div>
    </div>

    <footer class="footer-site">
        <p>AIDA - Sistema de Gestión Académica &copy; 2026</p>
    </footer>
</body>
</html>
