<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Académico - AIDA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/js/historial.js" defer></script>
    <script src="/js/seguridad.js"></script>
    <link rel="stylesheet" href="/css/styles.css"> 
</head>
<body>
    <div class="contenedor-historial">
        
        <div id="pantallaCarga" class="loading">
            <i class="ph ph-spinner icono-cargando" style="font-size: 2rem; color: #0284c7; margin-bottom: 10px; display: block;"></i>
            Cargando historial académico...
        </div>

        <div id="mensajeError" class="mensaje error hidden" style="margin-bottom: 20px;"></div>

        <div id="contenidoHistorial" class="hidden">
            <div class="header-info">
                <div>
                    <h1>Historial Académico</h1>
                    <h2 id="nombreAlumno">Nombre del Alumno</h2>
                    <p><strong>Libreta Universitaria:</strong> <span id="luAlumno">LU</span></p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Promedio (Aprobadas)</div>
                    <div class="stat-value" id="promedioValor">0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Progreso de la Carrera</div>
                    <div class="stat-value" id="progresoTexto">0%</div>
                    <div class="progress-bg">
                        <div class="progress-fill" id="progresoBarra"></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Materias Aprobadas</div>
                    <div class="stat-value"><span id="materiasAprobadas">0</span> <span style="font-size: 20px; color:#94a3b8;">/ <span id="totalMaterias">0</span></span></div>
                </div>
            </div>

            <h3 style="color: #0f172a; border-left: 4px solid #0284c7; padding-left: 10px; margin-top: 30px;">Detalle de Cursadas</h3>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th onclick="ordenarHistorial('anio')">Año <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                            <th onclick="ordenarHistorial('cuatrimestre')">Cuatrimestre <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                            <th onclick="ordenarHistorial('materia')">Materia <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                            <th onclick="ordenarHistorial('nota')">Nota <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                            <th onclick="ordenarHistorial('aprobada')">Estado <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorial">
                        </tbody>
                </table>
            </div>
        </div>

        <a href="javascript:history.back()" class="btn-volver"><i class="ph ph-arrow-left"></i> Volver al listado</a>
    </div>

    <footer class="footer-site">
        <p>AIDA - Sistema de Gestión Académica &copy; 2026</p>
    </footer>
</body>
</html>
