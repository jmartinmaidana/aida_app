<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AIDA - Emisión Individual</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/js/seguridad.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/certificados_lu.js" defer></script>

    <link rel="stylesheet" href="/css/styles.css"> 

</head>
<body>
    <navbar-aida></navbar-aida>

    <div class="contenedor">
        <div class="tarjeta-form">
            <h1><i class="ph ph-certificate"></i> Emisión Individual por LU</h1>
            <p>Ingrese la Libreta Universitaria del alumno para descargar su constancia de título en formato seguro.</p>
            
            <form id="formCertificado">
                <div class="grupo-form">
                    <label for="lu">Libreta Universitaria (LU):</label>
                    <input type="text" id="lu" name="lu" placeholder="Ej: 901/24" required>
                </div>
                
                <button type="submit" class="btn-generar">
                    <i class="ph ph-download-simple"></i> Generar y Descargar Constancia
                </button>
            </form>

            <div id="cajaMensaje" class="mensaje"></div>
        </div>
    </div>

    <footer-aida></footer-aida>
</body>
</html>
