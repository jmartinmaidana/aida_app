<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AIDA - Iniciar Sesión</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="/styles.css"> 
</head>
<body>

    <div class="login-wrapper">
        <div class="tarjeta-login">
            <div class="cabecera-login">
                <h1><i class="ph ph-graduation-cap"></i> AIDA</h1>
                <p>Acceso al sistema de gestión</p>
            </div>
            
            <form id="loginForm">
                <div class="grupo-form">
                    <label for="username">Usuario</label>
                    <div class="input-con-icono">
                        <i class="ph ph-user"></i>
                        <input type="text" id="username" placeholder="Ingrese su nombre de usuario" required>
                    </div>
                </div>
                
                <div class="grupo-form">
                    <label for="password">Contraseña</label>
                    <div class="input-con-icono">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-ingresar">
                    Iniciar Sesión <i class="ph ph-sign-in"></i>
                </button>
            </form>

            <div id="mensajeError" class="mensaje error"></div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mensajeError = document.getElementById('mensajeError');

            mensajeError.style.display = 'none'; 

            try {
                const respuesta = await fetch('/api/v0/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const json = await respuesta.json();

                if (json.estado === 'exito') {
                    window.location.href = '/menu'; 
                } else {
                    mensajeError.textContent = json.mensaje;
                    mensajeError.style.display = 'block';
                }
            } catch (error) {
                mensajeError.textContent = "Error de conexión con el servidor.";
                mensajeError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
