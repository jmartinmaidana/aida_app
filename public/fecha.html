<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema AIDA - Emisión Masiva por fecha</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/seguridad.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css"> 

</head>
<body>
    <nav class="navbar">
        <h1 class="navbar-brand"><i class="ph ph-graduation-cap"></i> Sistema AIDA</h1>
        <div class="navbar-links">
            <a href="/menu"><i class="ph ph-squares-four"></i> Inicio</a>
            <a href="/app/alumnos"><i class="ph ph-users"></i> Alumnos</a>
            <a href="/app/cursada"><i class="ph ph-pencil-line"></i> Carga de Notas</a>
            <a href="/app/certificados"><i class="ph ph-certificate"></i> Emisión Individual</a>
            <a href="/app/archivo"><i class="ph ph-upload-simple"></i> Carga Múltiple (CSV)</a>
            <button onclick="cerrarSesion()" class="btn-logout"><i class="ph ph-sign-out"></i> Salir</button>
        </div>
    </nav>

    <div class="contenedor">
        <div class="tarjeta-form">
            <h1><i class="ph ph-files"></i> Emisión Masiva por Fecha</h1>
            <p>Ingrese la fecha de solicitud del título para procesar en lote y generar los certificados de todos los alumnos correspondientes a esa fecha.</p>
            
            <div class="grupo-form">
                <label for="inputFecha">Fecha de Título en Trámite:</label>
                <input type="date" id="inputFecha" required>
            </div>
            
            <button onclick="buscarPorFecha()" class="btn-generar">
                <i class="ph ph-paper-plane-right"></i> Generar Lote de Certificados
            </button>

            <div id="resultado" class="mensaje"></div>
        </div>
    </div>

    <script>
    async function buscarPorFecha() {
        const fechaInput = document.getElementById('inputFecha').value;
        const btnGenerar = document.querySelector('.btn-generar');
        
        if (!fechaInput) {
            mostrarMensaje('Por favor, ingrese una fecha.', 'error');
            return;
        }

        mostrarMensaje('Generando certificados masivos, por favor espere...', '');
        
        // Efecto de carga
        const contenidoOriginal = btnGenerar.innerHTML;
        btnGenerar.innerHTML = '<i class="ph ph-spinner icono-cargando"></i> Procesando lote...';
        btnGenerar.disabled = true;

        try {
            const respuesta = await fetch('/api/v0/fecha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fecha: fechaInput }) 
            });

            if (respuesta.ok) {
                const blob = await respuesta.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `certificados_${fechaInput}.zip`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                
                mostrarMensaje('¡Descarga iniciada con éxito!', 'exito');
            } else {
                const datos = await respuesta.json();
                mostrarMensaje(datos.mensaje || 'Error al generar el lote.', 'error');
            }
        } catch (error) {
            mostrarMensaje('Error de conexión con el servidor.', 'error');
        } finally {
            // "finally" se ejecuta SIEMPRE, haya éxito o error. ¡Es perfecto para restaurar el botón!
            btnGenerar.innerHTML = contenidoOriginal;
            btnGenerar.disabled = false;
        }
    }

        function mostrarMensaje(texto, tipo) {
            const divResultado = document.getElementById('resultado');
            
            if (tipo === '') {
                divResultado.className = 'mensaje';
                divResultado.style.backgroundColor = '#f1f5f9';
                divResultado.style.borderColor = '#e2e8f0';
                divResultado.style.color = '#475569';
            } else {
                // En lugar de removeAttribute('style'), solo limpiamos los colores
                divResultado.style.backgroundColor = '';
                divResultado.style.borderColor = '';
                divResultado.style.color = '';
                divResultado.className = `mensaje ${tipo}`;
            }
            
            // Aseguramos que se muestre al final
            divResultado.style.display = 'block';
            divResultado.textContent = texto;
        }
    </script>
</body>
</html>
