<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDA - Emisión de Certificados</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="navbar">
    <h1>🎓 AIDA System</h1>
    <div class="nav-links"><a href="/menu">Panel Principal</a></div>
</nav>
<div class="contenedor">
    <div class="tarjeta">

        <form id="formCertificado">
            <div class="grupo-form">
                <label for="lu">Libreta Universitaria (LU):</label>
                <input type="text" id="lu" name="lu" placeholder="Ej: 901/24" required>
            </div>
            
            <button type="submit">Generar Constancia</button>
        </form>

    </div>

    <div id="cajaMensaje" class="mensaje"></div>
</div>
<script>
    document.getElementById('formCertificado').addEventListener('submit', async (evento) => {
        evento.preventDefault(); 
        const cajaMensaje = document.getElementById('cajaMensaje');
        cajaMensaje.style.display = 'none'; 

        const lu = document.getElementById('lu').value;

        try {
            const respuesta = await fetch('/api/v0/certificados', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lu: lu })
            });

            if (respuesta.ok) {
                // Convertimos la respuesta en un "Blob" (archivo binario)
                const blob = await respuesta.blob();
                
                // Creamos una URL temporal para ese archivo
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Certificado_${lu.replace('/', '-')}.html`;
                
                // Agregamos el link al documento, lo clickeamos y lo borramos
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                cajaMensaje.style.display = 'block';
                cajaMensaje.className = 'mensaje exito';
                cajaMensaje.textContent = "Certificado descargado exitosamente.";
            } else {
                const json = await respuesta.json();
                cajaMensaje.style.display = 'block';
                cajaMensaje.className = 'mensaje error';
                cajaMensaje.textContent = json.mensaje || "Error al generar certificado.";
            }
        } catch (error) {
            cajaMensaje.style.display = 'block';
            cajaMensaje.className = 'mensaje error';
            cajaMensaje.textContent = "Error de conexión con el servidor.";
        }
    });
</script>

</body>
</html>
