<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AIDA - Emisión Individual</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="/styles.css"> 

</head>
<body>
    <nav class="navbar">
        <h1 class="navbar-brand"><i class="ph ph-graduation-cap"></i> Sistema AIDA</h1>
        <div class="navbar-links">
            <a href="/menu"><i class="ph ph-squares-four"></i> Inicio</a>
            <a href="/app/alumnos"><i class="ph ph-users"></i> Alumnos</a>
            <a href="/app/cursada"><i class="ph ph-pencil-line"></i> Notas</a>
            <a href="/app/fecha"><i class="ph ph-files"></i> Masiva</a>
            <a href="/app/archivo"><i class="ph ph-upload-simple"></i> CSV</a>
            <button onclick="cerrarSesion()" class="btn-logout"><i class="ph ph-sign-out"></i> Salir</button>
        </div>
    </nav>

    <div class="contenedor">
        <div class="tarjeta-form">
            <h1><i class="ph ph-certificate"></i> Emisión Individual por LU</h1>
            <p>Ingrese la Libreta Universitaria del alumno para generar y descargar inmediatamente su constancia de título en formato seguro.</p>
            
            <form id="formCertificado">
                <div class="grupo-form">
                    <label for="lu">Libreta Universitaria (LU):</label>
                    <input type="text" id="lu" name="lu" placeholder="Ej: 901/24" required>
                </div>
                
                <button type="submit" class="btn-generar">
                    <i class="ph ph-download-simple"></i> Generar y Descargar Constancia
                </button>
            </form>

            <div id="cajaMensaje" class="mensaje"></div>
        </div>
    </div>

    <script>
        document.getElementById('formCertificado').addEventListener('submit', async (evento) => {
            evento.preventDefault(); 
            const cajaMensaje = document.getElementById('cajaMensaje');
            cajaMensaje.style.display = 'none'; 

            const lu = document.getElementById('lu').value;

            try {
                const respuesta = await fetch('/api/v0/certificados', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lu: lu })
                });

                if (respuesta.ok) {
                    const blob = await respuesta.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Certificado_${lu.replace('/', '-')}.html`;
                    
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    
                    cajaMensaje.style.display = 'block';
                    cajaMensaje.className = 'mensaje exito';
                    cajaMensaje.textContent = "Certificado descargado exitosamente.";
                    document.getElementById('lu').value = '';
                } else {
                    const json = await respuesta.json();
                    cajaMensaje.style.display = 'block';
                    cajaMensaje.className = 'mensaje error';
                    cajaMensaje.textContent = json.mensaje || "Error al generar certificado.";
                }
            } catch (error) {
                cajaMensaje.style.display = 'block';
                cajaMensaje.className = 'mensaje error';
                cajaMensaje.textContent = "Error de conexión con el servidor.";
            }
        });

        async function cerrarSesion() {
            try {
                await fetch('/api/v0/auth/logout', { method: 'POST' });
                window.location.href = '/app/login';
            } catch (error) { 
                alert("Error al intentar cerrar sesión."); 
            }
        }
    </script>
</body>
</html>
