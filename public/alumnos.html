<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema AIDA - Gestión de Alumnos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/seguridad.js"></script>
    <link rel="stylesheet" href="/styles.css"> 
</head>
<body>
    <nav class="navbar">
        <h1 class="navbar-brand"><i class="ph ph-graduation-cap"></i> Sistema AIDA</h1>
        <div class="navbar-links">
            <a href="/menu"><i class="ph ph-squares-four"></i> Inicio</a>
            <a href="/app/cursada"><i class="ph ph-pencil-line"></i> Carga de Notas</a>
            <a href="/app/certificados"><i class="ph ph-certificate"></i> Emisión Individual</a>
            <a href="/app/fecha"><i class="ph ph-files"></i> Emisión por Fecha</a>
            <a href="/app/archivo"><i class="ph ph-upload-simple"></i> Carga Múltiple (CSV)</a>
            <button onclick="cerrarSesion()" class="btn-logout"><i class="ph ph-sign-out"></i> Salir</button>
        </div>
    </nav>

    <div class="contenedor-ancho">
        <div class="cabecera-pagina">
            <h1><i class="ph ph-users"></i> Directorio de Alumnos</h1>
            <button class="btn-accion-principal" onclick="mostrarFormularioCreacion()" style="background-color: #10b981; width: auto;">
                <i class="ph ph-user-plus"></i> Registrar Alumno
            </button>
        </div>

        <div class="contenedor-tabla">
            <table id="tablaAlumnos">
                <thead>
                    <tr>
                        <th onclick="ordenarTabla('lu')">LU <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                        <th onclick="ordenarTabla('apellido')">Apellidos <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                        <th onclick="ordenarTabla('nombres')">Nombres <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                        <th onclick="ordenarTabla('titulo')">Título <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                        <th onclick="ordenarTabla('titulo_en_tramite')" style="text-align: center;">En Trámite <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                        <th onclick="ordenarTabla('egreso')" style="text-align: center;">Egreso <i class="ph ph-arrows-down-up" style="font-size: 0.8rem;"></i></th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr><td colspan="7" style="text-align: center; padding: 30px; color: #64748b;">Cargando datos del padrón...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="seccionFormulario" class="tarjeta-form" style="display: none; max-width: 800px; margin: 40px auto 0 auto; padding: 30px;">
            <h3 id="tituloFormulario" style="margin-top: 0; font-size: 1.3rem; color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; margin-bottom: 20px;">Alta de Nuevo Alumno</h3>
            
            <div class="grid-formulario">
                <div class="grupo-form">
                    <label>LU (ej. 123/24):</label> 
                    <input type="text" id="inputLu" placeholder="123/24">
                </div>
                <div class="grupo-form">
                    <label>Carrera:</label> 
                    <select id="inputCarrera" required>
                        <option value="">-- Seleccione una carrera --</option>
                    </select>
                </div>
                <div class="grupo-form">
                    <label>Nombres:</label> 
                    <input type="text" id="inputNombres" placeholder="Nombres del alumno">
                </div>
                <div class="grupo-form">
                    <label>Apellido:</label> 
                    <input type="text" id="inputApellido" placeholder="Apellidos del alumno">
                </div>
                <div class="grupo-form">
                    <label>Fecha Título en Trámite:</label> 
                    <input type="date" id="inputTramite">
                </div>
                <div class="grupo-form">
                    <label>Fecha Egreso:</label> 
                    <input type="date" id="inputEgreso">
                </div>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 25px;">
                <button class="btn-cancelar" onclick="ocultarFormulario()">Cancelar</button>
                <button class="btn-accion-principal" onclick="guardarNuevoAlumno()" style="width: auto;">
                    <i class="ph ph-floppy-disk"></i> Guardar Datos
                </button>
            </div>
        </div>
    </div>

    <script>
        let alumnosLocales = []; 
        let luEnEdicion = null; 
        let columnaOrdenActual = '';
        let ordenAscendente = true;

        function formatoTabla(fechaIso) {
            if (!fechaIso) return ''; 
            const soloFecha = fechaIso.split('T')[0]; 
            const partes = soloFecha.split('-'); 
            return `${partes[2]}-${partes[1]}-${partes[0]}`; 
        }

        function formatoInput(fechaIso) {
            if (!fechaIso) return '';
            return fechaIso.split('T')[0]; 
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarAlumnos();
            cargarOpcionesCarreras();
        });

        async function cargarOpcionesCarreras() {
            try {
                const respuesta = await fetch('/api/v0/carreras');
                if (respuesta.ok) {
                    const carreras = await respuesta.json();
                    const select = document.getElementById('inputCarrera');
                    
                    carreras.forEach(carrera => {
                        const opcion = document.createElement('option');
                        opcion.value = carrera.id;
                        opcion.textContent = carrera.nombre;
                        select.appendChild(opcion);
                    });
                }
            } catch (error) {
                console.error("Error al cargar carreras:", error);
            }
        }

        async function cargarAlumnos() {
            try {
                const respuesta = await fetch('/api/alumnos');
                const json = await respuesta.json();

                if (json.estado === 'exito') {
                    alumnosLocales = json.datos;
                    renderizarTabla(); 
                } else {
                    document.getElementById('cuerpoTabla').innerHTML = `<tr><td colspan="7" style="color: #ef4444; text-align: center; padding: 20px;">Error: ${json.mensaje}</td></tr>`;
                }
            } catch (error) {
                document.getElementById('cuerpoTabla').innerHTML = `<tr><td colspan="7" style="color: #ef4444; text-align: center; padding: 20px;">Error de conexión con el servidor.</td></tr>`;
            }
        }

        function renderizarTabla() {
            const cuerpoTabla = document.getElementById('cuerpoTabla');
            cuerpoTabla.innerHTML = ''; 

            if (alumnosLocales.length === 0) {
                cuerpoTabla.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #64748b; padding: 30px;">No hay alumnos registrados en el sistema.</td></tr>';
                return;
            }

            alumnosLocales.forEach(alumno => {
                let htmlBotonTramite = '';
                if (alumno.egreso && !alumno.titulo_en_tramite) {
                    htmlBotonTramite = `
                        <button class="btn-mini tramite" onclick="iniciarTramite('${alumno.lu}')" title="Iniciar Trámite de Título">
                            <i class="ph ph-graduation-cap"></i>
                        </button>`;
                }

                const tituloMostrar = alumno.titulo ? alumno.titulo : '<span style="color: #94a3b8; font-style: italic;">Sin asignar</span>';
                const tramiteMostrar = alumno.titulo_en_tramite ? formatoTabla(alumno.titulo_en_tramite) : '<span style="color: #cbd5e1;">-</span>';
                const egresoMostrar = alumno.egreso ? formatoTabla(alumno.egreso) : '<span style="color: #cbd5e1;">-</span>';

                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td style="font-weight: 500; color: #0284c7;">${alumno.lu}</td>
                    <td style="font-weight: 500;">${alumno.apellido}</td>
                    <td>${alumno.nombres}</td>
                    <td>${tituloMostrar}</td>
                    <td style="text-align: center;">${tramiteMostrar}</td>
                    <td style="text-align: center;">${egresoMostrar}</td>
                    <td>
                        <div class="acciones-tabla">
                            <button class="btn-mini" style="color: #8b5cf6;" 
                                    onclick="window.location.href='/app/historial?lu=${encodeURIComponent(alumno.lu)}'" 
                                    title="Ver Historial Académico">
                                <i class="ph ph-chart-line-up"></i>
                            </button>
                            
                            ${htmlBotonTramite}
                            <button class="btn-mini editar" onclick="prepararEdicion('${alumno.lu}')" title="Editar Alumno">
                                <i class="ph ph-pencil-simple"></i>
                            </button>
                            <button class="btn-mini borrar" onclick="borrarAlumno('${alumno.lu}')" title="Borrar Alumno">
                                <i class="ph ph-trash"></i>
                            </button>
                        </div>
                    </td>
                `;
                cuerpoTabla.appendChild(fila);
            });
        }

        async function iniciarTramite(lu) {
            try {
                const respuesta = await fetch('/api/v0/tramite-titulo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lu: lu })
                });
                const resultado = await respuesta.json();
                if (respuesta.ok) {
                    alert("Trámite iniciado con éxito");
                    location.reload(); 
                } else {
                    alert("Error: " + resultado.mensaje);
                }
            } catch (error) {
                alert("Error de conexión");
            }
        }

        function ordenarTabla(columna) {
            if (columnaOrdenActual === columna) {
                ordenAscendente = !ordenAscendente; 
            } else {
                columnaOrdenActual = columna;
                ordenAscendente = true; 
            }
            alumnosLocales.sort((a, b) => {
                let valorA = a[columna] ? a[columna].toString().toLowerCase() : '';
                let valorB = b[columna] ? b[columna].toString().toLowerCase() : '';
                if (valorA < valorB) return ordenAscendente ? -1 : 1;
                if (valorA > valorB) return ordenAscendente ? 1 : -1;
                return 0; 
            });
            renderizarTabla();
        }

        // --- MAGIA DE SCROLL SUAVE AÑADIDA AQUÍ ---
        function mostrarFormularioCreacion() {
            const form = document.getElementById('seccionFormulario');
            form.style.display = 'block';
            
            // Pausa milimétrica para que el navegador dibuje el formulario antes de desplazarse hacia él
            setTimeout(() => {
                form.scrollIntoView({ behavior: 'smooth', block: 'start' });
                document.getElementById('inputLu').focus();
            }, 50);
        }

        function ocultarFormulario() {
            document.getElementById('seccionFormulario').style.display = 'none';
            luEnEdicion = null;
            document.getElementById('tituloFormulario').textContent = "Alta de Nuevo Alumno";
            document.getElementById('inputLu').disabled = false; 

            document.getElementById('inputLu').value = '';
            document.getElementById('inputNombres').value = '';
            document.getElementById('inputApellido').value = '';
            document.getElementById('inputCarrera').value = ''; 
            document.getElementById('inputTramite').value = '';
            document.getElementById('inputEgreso').value = '';
            
            // Si el usuario cancela, volvemos a subir a la tabla de forma suave
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prepararEdicion(lu) {
            const alumno = alumnosLocales.find(a => a.lu === lu);
            if (!alumno) return;

            document.getElementById('inputLu').value = alumno.lu;
            document.getElementById('inputNombres').value = alumno.nombres;
            document.getElementById('inputApellido').value = alumno.apellido;
            document.getElementById('inputCarrera').value = alumno.carrera_id || '';
            document.getElementById('inputTramite').value = formatoInput(alumno.titulo_en_tramite);
            document.getElementById('inputEgreso').value = formatoInput(alumno.egreso);

            luEnEdicion = lu;
            document.getElementById('tituloFormulario').textContent = `Editar Alumno: ${lu}`;
            document.getElementById('inputLu').disabled = true; 
            
            mostrarFormularioCreacion();
        }

        async function guardarNuevoAlumno() {
            const selectCarrera = document.getElementById('inputCarrera');
            const idCarrera = selectCarrera.value ? parseInt(selectCarrera.value) : null;
            
            const datosAlumno = {
                lu: luEnEdicion ? luEnEdicion : document.getElementById('inputLu').value,
                nombres: document.getElementById('inputNombres').value,
                apellido: document.getElementById('inputApellido').value,
                carrera_id: idCarrera,
                // Le pasamos null explícitamente. ¡El backend se encargará de completarlo!
                titulo: null, 
                titulo_en_tramite: document.getElementById('inputTramite').value || null,
                egreso: document.getElementById('inputEgreso').value || null
            };

            // La barrera de seguridad del frontend
            if (!datosAlumno.lu || !datosAlumno.apellido || !datosAlumno.nombres || !datosAlumno.carrera_id) {
                alert("Por favor, complete LU, Nombres, Apellido y seleccione una Carrera.");
                return;
            }

            try {
                let urlFinal = luEnEdicion ? `/api/alumnos/${luEnEdicion.split('/')[0]}/${luEnEdicion.split('/')[1]}` : '/api/alumno';
                const metodo = luEnEdicion ? 'PUT' : 'POST';

                const respuesta = await fetch(urlFinal, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosAlumno)
                });

                const json = await respuesta.json();

                if (respuesta.ok) { // Es más seguro validar respuesta.ok que json.estado
                    alert(json.mensaje);
                    ocultarFormulario();
                    cargarAlumnos(); 
                } else {
                    alert('Error al guardar: ' + json.mensaje);
                }
            } catch (error) {
                alert('Error de conexión al intentar guardar.');
            }
        }

        async function borrarAlumno(lu) {
            const seguro = confirm(`¿Está absolutamente seguro que desea eliminar al alumno con LU: ${lu}? Esta acción no se puede deshacer.`);
            if (!seguro) return; 

            try {
                const partesLu = lu.split('/');
                const urlDelete = `/api/alumnos/${partesLu[0]}/${partesLu[1]}`;

                const respuesta = await fetch(urlDelete, {
                    method: 'DELETE'
                });
                const json = await respuesta.json();

                if (json.estado === 'exito') {
                    alert(json.mensaje);
                    cargarAlumnos(); 
                } else {
                    alert('Error al borrar: ' + json.mensaje);
                }
            } catch (error) {
                alert('Error de conexión al intentar borrar.');
            }
        }

        async function cerrarSesion() {
            try {
                await fetch('/api/v0/auth/logout', { method: 'POST' });
                window.location.href = '/app/login';
            } catch (error) { 
                alert("Error al intentar cerrar sesión."); 
            }
        }
    </script>
</body>
</html>
