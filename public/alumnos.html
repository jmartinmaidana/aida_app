<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Alumnos</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #0056b3; color: white; cursor: pointer; }
        th:hover { background-color: #004494; }
        .boton-nuevo { display: inline-block; padding: 10px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; margin-bottom: 15px; cursor: pointer; border: none; font-size: 16px; }
        .boton-nuevo:hover { background: #218838; }
        
        /* Estilos para el formulario oculto */
        #seccionFormulario { display: none; background: #f9f9f9; padding: 20px; border: 1px solid #ddd; margin-bottom: 20px; border-radius: 5px; }
        #seccionFormulario label { display: inline-block; width: 180px; font-weight: bold; margin-bottom: 10px; }
        #seccionFormulario input { padding: 5px; width: 200px; margin-bottom: 10px; }
        .btn-guardar { background: #28a745; color: white; padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer; }
        .btn-cancelar { background: #dc3545; color: white; padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <h2>Panel de Gestión de Alumnos</h2>
    <a href="/menu">← Volver al menú</a>
    <hr>
    
    <button class="boton-nuevo" onclick="mostrarFormularioCreacion()">➕ Cargar Nuevo Alumno</button>

    <div id="seccionFormulario">
        <h3>Alta de Nuevo Alumno</h3>
        <label>LU (ej. 123/24):</label> <input type="text" id="inputLu" placeholder="123/24"><br>
        <label>Nombres:</label> <input type="text" id="inputNombres"><br>
        <label>Apellido:</label> <input type="text" id="inputApellido"><br>
        <label>Título:</label> <input type="text" id="inputTitulo"><br>
        <label>Fecha Título en Trámite:</label> <input type="date" id="inputTramite"><br>
        <label>Fecha Egreso:</label> <input type="date" id="inputEgreso"><br>
        
        <div style="margin-top: 15px;">
            <button class="btn-guardar" onclick="guardarNuevoAlumno()">Guardar Alumno</button>
            <button class="btn-cancelar" onclick="ocultarFormulario()">Cancelar</button>
        </div>
    </div>

    <table id="tablaAlumnos">
        <thead>
            <tr>
                <th onclick="ordenarTabla('lu')">LU ↕️</th>
                <th onclick="ordenarTabla('apellido')">Apellidos ↕️</th>
                <th onclick="ordenarTabla('nombres')">Nombres ↕️</th>
                <th onclick="ordenarTabla('titulo')">Título ↕️</th>
                <th onclick="ordenarTabla('titulo_en_tramite')">En Trámite ↕️</th>
                <th onclick="ordenarTabla('egreso')">Egreso ↕️</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <tr><td colspan="7" style="text-align: center;">Cargando datos...</td></tr>
        </tbody>
    </table>

    <script>
        // Variable global para recordar qué estamos haciendo
        let alumnosLocales = []; 
        let luEnEdicion = null; 
        // Nuevas variables para el ordenamiento
        let columnaOrdenActual = '';
        let ordenAscendente = true;
        // Convierte "2025-08-20T03:00:00.000Z" a "20-08-2025" (Para la tabla visual)
        function formatoTabla(fechaIso) {
            if (!fechaIso) return ''; // Si el alumno no tiene fecha, devolvemos vacío
            const soloFecha = fechaIso.split('T')[0]; // Nos quedamos con "2025-08-20"
            const partes = soloFecha.split('-'); // Cortamos por el guion
            return `${partes[2]}-${partes[1]}-${partes[0]}`; // Invertimos a DD-MM-AAAA
        }

        // Convierte "2025-08-20T03:00:00.000Z" a "2025-08-20" (Para rellenar el formulario de edición)
        function formatoInput(fechaIso) {
            if (!fechaIso) return '';
            // Si viene como "2024-03-14T00:00:00.000Z", cortamos en la T
            return fechaIso.split('T')[0]; 
        }
        // ==========================================
        // 1. CARGA INICIAL (GET)
        // ==========================================
        document.addEventListener('DOMContentLoaded', cargarAlumnos);

        

        async function cargarAlumnos() {
            try {
                const respuesta = await fetch('/api/alumnos');
                const json = await respuesta.json();

                if (json.estado === 'exito') {
                    alumnosLocales = json.datos; // Guardamos los datos
                    renderizarTabla(); // Llamamos a la nueva función que solo dibuja
                } else {
                    document.getElementById('cuerpoTabla').innerHTML = `<tr><td colspan="7" style="color: red; text-align: center;">Error: ${json.mensaje}</td></tr>`;
                }
            } catch (error) {
                document.getElementById('cuerpoTabla').innerHTML = `<tr><td colspan="7" style="color: red; text-align: center;">Error de conexión.</td></tr>`;
            }
        }
        function renderizarTabla() {
            const cuerpoTabla = document.getElementById('cuerpoTabla');
            cuerpoTabla.innerHTML = ''; 

            alumnosLocales.forEach(alumno => {
                // Lógica para el botón de trámite:
                // Solo aparece si ya egresó y si todavía no inició el trámite.
                let htmlBotonTramite = '';
                if (alumno.egreso && !alumno.titulo_en_tramite) {
                    htmlBotonTramite = `
                        <button onclick="iniciarTramite('${alumno.lu}')" 
                            style="background: #28a745; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px; margin-right: 5px;">
                            🎓 Iniciar Trámite
                        </button>`;
                }

                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${alumno.lu}</td>
                    <td>${alumno.apellido}</td>
                    <td>${alumno.nombres}</td>
                    <td>${alumno.titulo}</td>
                    <td>${formatoTabla(alumno.titulo_en_tramite)}</td>
                    <td>${formatoTabla(alumno.egreso)}</td>
                    <td>
                        ${htmlBotonTramite}
                        <button onclick="prepararEdicion('${alumno.lu}')" style="background: #ffc107; border: none; padding: 5px; cursor: pointer; border-radius: 3px;">Editar</button>
                        <button onclick="borrarAlumno('${alumno.lu}')" style="background: #dc3545; color: white; border: none; padding: 5px; cursor: pointer; border-radius: 3px;">Borrar</button>
                    </td>
                `;
                cuerpoTabla.appendChild(fila);
            });
        }

        async function iniciarTramite(lu) {
            try {
                const respuesta = await fetch('/api/v0/tramite-titulo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lu: lu })
                });

                const resultado = await respuesta.json();
                
                if (respuesta.ok) {
                    alert("Trámite iniciado con éxito");
                    location.reload(); // Recargamos para ver la fecha reflejada
                } else {
                    alert("Error: " + resultado.mensaje);
                }
            } catch (error) {
                alert("Error de conexión");
            }
        }

        function ordenarTabla(columna) {
            // 1. Decidimos la dirección del orden
            if (columnaOrdenActual === columna) {
                ordenAscendente = !ordenAscendente; // Si tocamos la misma, invertimos el orden
            } else {
                columnaOrdenActual = columna;
                ordenAscendente = true; // Si es una nueva, empezamos de la A a la Z
            }

            // 2. Ordenamos el arreglo en memoria
            alumnosLocales.sort((a, b) => {
                // Convertimos a minúsculas para que la 'A' y la 'a' valgan lo mismo
                let valorA = a[columna] ? a[columna].toString().toLowerCase() : '';
                let valorB = b[columna] ? b[columna].toString().toLowerCase() : '';

                if (valorA < valorB) return ordenAscendente ? -1 : 1;
                if (valorA > valorB) return ordenAscendente ? 1 : -1;
                return 0; // Son exactamente iguales
            });

            // 3. Volvemos a dibujar la tabla con el arreglo ya ordenado
            renderizarTabla();
        }

        // ==========================================
        // 2. LÓGICA DEL FORMULARIO (POST / PUT)
        // ==========================================
        function mostrarFormularioCreacion() {
            document.getElementById('seccionFormulario').style.display = 'block';
        }

        function ocultarFormulario() {
            document.getElementById('seccionFormulario').style.display = 'none';
            
            // Reseteamos el formulario a "Modo Creación"
            luEnEdicion = null;
            document.querySelector('#seccionFormulario h3').textContent = "Alta de Nuevo Alumno";
            document.getElementById('inputLu').disabled = false; // Volvemos a habilitar la LU

            document.getElementById('inputLu').value = '';
            document.getElementById('inputNombres').value = '';
            document.getElementById('inputApellido').value = '';
            document.getElementById('inputTitulo').value = '';
            document.getElementById('inputTramite').value = '';
            document.getElementById('inputEgreso').value = '';
        }

        function prepararEdicion(lu) {
            // Buscamos los datos del alumno en la memoria
            const alumno = alumnosLocales.find(a => a.lu === lu);
            if (!alumno) return;

            // Rellenamos el formulario
            document.getElementById('inputLu').value = alumno.lu;
            document.getElementById('inputNombres').value = alumno.nombres;
            document.getElementById('inputApellido').value = alumno.apellido;
            document.getElementById('inputTitulo').value = alumno.titulo;
            document.getElementById('inputTramite').value = alumno.titulo_en_tramite;
            document.getElementById('inputEgreso').value = alumno.egreso;

            // Cambiamos a "Modo Edición"
            luEnEdicion = lu;
            document.querySelector('#seccionFormulario h3').textContent = `Editar Alumno: ${lu}`;
            document.getElementById('inputLu').disabled = true; // Bloqueamos la LU para que no la rompan
            
            mostrarFormularioCreacion();
        }

        async function guardarNuevoAlumno() {
            const datosAlumno = {
                // Si estamos editando, tomamos la LU de la variable (porque el input está deshabilitado). Si no, del input.
                lu: luEnEdicion ? luEnEdicion : document.getElementById('inputLu').value,
                nombres: document.getElementById('inputNombres').value,
                apellido: document.getElementById('inputApellido').value,
                titulo: document.getElementById('inputTitulo').value,
                titulo_en_tramite: document.getElementById('inputTramite').value,
                egreso: document.getElementById('inputEgreso').value
            };

            if (!datosAlumno.lu || !datosAlumno.apellido || !datosAlumno.nombres) {
                alert("Por favor, complete al menos la LU, Nombres y Apellido.");
                return;
            }

            // Magia: Decidimos a qué endpoint pegarle según si estamos creando o editando
            const url = luEnEdicion ? `/api/alumnos/${luEnEdicion}` : '/api/alumno';
            const metodo = luEnEdicion ? 'PUT' : 'POST';

            try {
                const respuesta = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosAlumno)
                });

                const json = await respuesta.json();

                if (json.estado === 'exito') {
                    alert(json.mensaje);
                    ocultarFormulario();
                    cargarAlumnos(); 
                } else {
                    alert('Error al guardar: ' + json.mensaje);
                }
            } catch (error) {
                alert('Error de conexión al intentar guardar.');
            }
        }

        // ==========================================
        // 3. ELIMINAR (DELETE)
        // ==========================================
        async function borrarAlumno(lu) {
            // Confirmación de seguridad nativa del navegador
            const seguro = confirm(`¿Está absolutamente seguro que desea eliminar al alumno con LU: ${lu}? Esta acción no se puede deshacer.`);
            
            if (!seguro) return; // Si dice que no, abortamos

            try {
                const respuesta = await fetch(`/api/alumnos/${lu}`, {
                    method: 'DELETE' // Le avisamos a Express que queremos borrar
                });
                const json = await respuesta.json();

                if (json.estado === 'exito') {
                    alert(json.mensaje);
                    cargarAlumnos(); // Refrescamos la tabla para que desaparezca
                } else {
                    alert('Error al borrar: ' + json.mensaje);
                }
            } catch (error) {
                alert('Error de conexión al intentar borrar.');
            }
        }
    </script>
</body>
</html>
