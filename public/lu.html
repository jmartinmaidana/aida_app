<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscar por LU</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input, button { padding: 8px; margin-top: 10px; }
        #resultado { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
        .exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h2>Generar Certificado por Libreta Universitaria</h2>
    <a href="/menu">← Volver al menú</a>
    <hr>
    
    <label>Ingrese la LU (ej. 123/24):</label><br>
    <input type="text" id="inputLu" placeholder="Prefijo/Año">
    <button onclick="buscarCertificado()">Generar</button>

    <div id="resultado"></div>

    <script>
        async function buscarCertificado() {
            const lu = document.getElementById('inputLu').value;
            const divResultado = document.getElementById('resultado');
            
            if (!lu.includes('/')) {
                mostrarMensaje('Formato inválido. Debe incluir la barra (/).', 'error');
                return;
            }

            mostrarMensaje('Procesando...', '');

            try {
                // Aquí nos comunicamos con nuestra API REST
                const respuesta = await fetch(`/api/v0/lu/${lu}`);
                const datos = await respuesta.json();

                if (datos.estado === 'exito') {
                    mostrarMensaje(datos.mensaje, 'exito');
                } else {
                    mostrarMensaje(datos.mensaje + (datos.detalle ? ': ' + datos.detalle : ''), 'error');
                }
            } catch (error) {
                mostrarMensaje('Error de conexión con el servidor.', 'error');
            }
        }

        function mostrarMensaje(texto, tipo) {
            const divResultado = document.getElementById('resultado');
            divResultado.style.display = 'block';
            divResultado.className = tipo;
            divResultado.textContent = texto;
        }
    </script>
</body>
</html>
