name: Pipeline AIDA

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  # === JOB 1: Verificar que el código no esté roto ===
  verificacion:
    name: Compilación y Verificación
    runs-on: ubuntu-latest
    
    # NUEVO: Levantamos una base de datos temporal solo para que los tests pasen
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: aida_test_user
          POSTGRES_PASSWORD: aida_super_password
          POSTGRES_DB: aida_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          
      - name: Instalar dependencias
        run: npm install
        
      - name: Compilar aplicación (TypeScript a JS)
        run: npx tsc
        
      - name: Instalar y Compilar Frontend (React)
        run: |
          cd frontend
          npm install
          npm run build
          
      # NUEVO: Ejecutamos las pruebas conectándonos a la BD temporal de arriba
      - name: Ejecutar Tests
        env:
          NODE_ENV: test
          SESSION_SECRET: secreto_super_seguro
          TEST_DB_URL: postgresql://aida_test_user:aida_super_password@localhost:5432/aida_test_db
          RESEND_API_KEY: re_123456789_dummy_key_for_testing
        run: npm test

  # === JOB 2: Publicar en Render (Solo si el Job 1 fue exitoso) ===
  deploy:
    name: Deploy a Producción
    needs: verificacion  # Obliga a esperar a que termine la verificación
    if: github.ref == 'refs/heads/main' # Solo se ejecuta si estamos en la rama main
    runs-on: ubuntu-latest
    environment:
      name: DEPLOYMENT # Conecta con el entorno y el revisor que configuramos
    steps:
      - name: Disparar deploy en Render
        run: |
          curl "${{ secrets.URL_DEPLOYMENT }}"