<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Certificado de Graduación Profesional</title>
    <style>
        /* Configuraciones básicas y tipografía clásica */
        body { 
            font-family: 'Georgia', Times, serif; /* Tipografía serif para solemnidad */
            text-align: center; 
            padding: 0; 
            margin: 0;
            background-color: #e0e0e0; /* Fondo gris para resaltar el papel en pantalla */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal: Simula una hoja A4 horizontal */
        .certificado-container {
            background-color: #fff;
            width: 1120px; /* Aprox A4 horizontal en pixeles */
            height: 790px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            box-sizing: border-box;
            position: relative;
            /* Textura sutil de papel antiguo (opcional, usar color sólido si prefieres) */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxnIGZpbGwtcnVsZT0iZXZlbm9kZCI+PGcgZmlsbD0iI2Y5ZjlmNCIgZmlsbC1vcGFjaXR5PSIwLjUiPjxwYXRoIGQ9Ik0wIDBoNHY0SDBWMHptMiAySDB2MmgyVjJ6TTAgMGgydjJIMFYwem0yIDJoMnYySDJWMnpNMiAwaDJ2Mkg yVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
        }

        /* Borde ornamental triple clásico */
        .borde-externo {
            border: 2px solid #5d4037; /* Marrón oscuro */
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            position: relative;
        }

        .borde-interno {
            border: 6px double #5d4037; /* Doble línea */
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding: 50px;
        }

        /* Elementos decorativos en las esquinas */
        .esquina {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 8px solid #c19a6b; /* Color oro/bronce */
            border-radius: 50%;
        }
        .top-left { top: -15px; left: -15px; border-right: none; border-bottom: none; }
        .top-right { top: -15px; right: -15px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: -15px; left: -15px; border-right: none; border-top: none; }
        .bottom-right { bottom: -15px; right: -15px; border-left: none; border-top: none; }

        /* Encabezado e Institución */
        .header { margin-bottom: 30px; }
        .logo-placeholder {
            font-size: 14px;
            color: #7f8c8d;
            border: 1px dashed #bdc3c7;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }
        .institucion { 
            font-size: 1.6em; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: #2c3e50; 
            margin: 0;
            font-weight: bold;
        }

        /* Título principal del documento */
        h1 { 
            font-family: 'Times New Roman', Times, serif;
            color: #c19a6b; /* Oro */
            font-size: 4em; 
            margin: 10px 0; 
            text-transform: none;
            font-weight: normal;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Textos de conexión */
        .certifica-que { font-size: 1.4em; color: #555; margin: 20px 0; font-style: italic;}
        .concede-titulo { font-size: 1.3em; color: #555; margin: 15px 0; }

        /* Nombre del Graduado (Destacado) */
        h2 { 
            font-family: 'Courier New', Courier, monospace; /* Simula máquina de escribir, común en registros */
            color: #000; 
            font-size: 3.5em; 
            margin: 10px 0; 
            border-bottom: 2px solid #eee;
            display: inline-block;
            padding: 0 30px;
        }

        /* Título obtenido (Elegante) */
        h3 { 
            color: #5d4037; 
            font-size: 2.2em; 
            margin: 10px 0 50px 0; 
            font-weight: bold;
            font-style: italic;
        }

        /* Sección inferior: Firmas y Sello */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 60px;
            padding: 0 50px;
        }

        .firma-box {
            width: 250px;
            text-align: center;
        }
        .linea-firma {
            border-top: 1px solid #7f8c8d;
            margin-bottom: 10px;
        }
        .cargo {
            font-size: 0.9em;
            color: #7f8c8d;
            text-transform: uppercase;
        }


        .fecha { font-size: 1.1em; color: #7f8c8d; font-style: italic; margin-top: 20px;}

        /* Optimización para impresión */
        @media print {
            body { background: none; padding: 0; display: block;}
            .certificado-container { 
                box-shadow: none; 
                width: 100%; 
                height: 100vh;
                background-image: none;
                background-color: #fff;
            }
            .institucion, h1, h3 { color: #000 !important; } /* Ahorro de tinta negra */
        }
    </style>
</head>
<body>
    <div class="certificado-container">
        <div class="borde-externo">
            <div class="esquina top-left"></div>
            <div class="esquina top-right"></div>
            <div class="esquina bottom-left"></div>
            <div class="esquina bottom-right"></div>
            
            <div class="borde-interno">
                <div class="header">
                    <div class="logo-placeholder">LOGO<br>INSTITUCIÓN</div>
                    <p class="institucion">República Argentina</p>
                </div>

                <h1>Certificado de Graduación</h1>
                
                <p class="certifica-que">Por cuanto se han acreditado los requisitos académicos exigidos,</p>
                
                <p class="concede-titulo">Se otorga a:</p>
                
                <h2>{{NOMBRES}} {{APELLIDO}}</h2>
                
                <p class="concede-titulo">El Grado Académico de:</p>
                
                <h3>{{TITULO}}</h3>
                
                <div class="footer">
                    <div class="firma-box">
                        <div class="linea-firma"></div>
                        <p class="cargo">Secretario Académico</p>
                    </div>
                    
                    <div class="firma-box">
                        <div class="linea-firma"></div>
                        <p class="cargo">Rector / Decano</p>
                    </div>
                </div>


-            </div>
        </div>
    </div>
</body>
</html>
