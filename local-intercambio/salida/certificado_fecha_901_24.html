<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Certificado de Graduación</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px; background-color: #f4f4f9; }
        .certificado { border: 10px solid #2c3e50; padding: 50px; background-color: #ffffff; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2980b9; font-size: 3em; margin-bottom: 10px; }
        h2 { color: #2c3e50; font-size: 2.5em; margin: 20px 0; text-transform: uppercase; }
        h3 { color: #16a085; font-size: 2em; margin-bottom: 40px; }
        p { font-size: 1.2em; color: #555; }
        .fecha { margin-top: 50px; font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="certificado">
        <h1>Certificado de Graduación</h1>
        <p>La institución certifica con orgullo que:</p>
        <h2>Ana Gómez</h2>
        <p>Ha completado satisfactoriamente los requisitos para obtener el título de:</p>
        <h3>Técnico Web</h3>
        <p class="fecha">Fecha de emisión del certificado: 14/3/2026</p>
    </div>
</body>
</html>
